<polymer-element name="project-grid">
  <template>

    <style>
      .chip-container {
        position: absolute;
        top: 275px;
        right: 0;
        left: 0;
        text-align: center;
      }

      .chip {
        display: inline-block;
        position: relative;
        border-radius: 3px;
        margin: 4px;
        overflow: hidden;
        text-align: start;
        background-color: #000;
        box-shadow: 0 2px 10px 0 rgba(0, 0, 0, 0.16);
      }

      .chip-top {
        width: 200px;
        height: 200px;
      }

      .chip-bottom {
        padding: 8px;
        line-height: 1.5;
      }

      .chip-description-title {
        font-weight: bold;
      }

      #details {
        padding: 200px 10% 0;
      }

      .card {
        height: 400px;
        border-radius: 3px;
        text-align: start;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      .card-left {
        width: 400px;
      }

      .card-right {
        padding: 24px;
      }

      .card-icon {
        border-radius: 50%;
        width: 60px;
        height: 60px;
        margin-right: 16px;
      }

      .card-description-title {
        font-size: 2em;
      }
    </style>

    <core-animated-pages selected="{{page}}" transitions="hero-transition" on-core-animated-pages-transition-end="{{complete}}">

      <section>

        <div class="chip-container" hero-p on-tap="{{transition}}">

          <template repeat="{{items as item}}">

            <div class="chip" hero-id="{{item.title}}-{{item.description}}" hero?="{{selecteddescription === item }}">
              <div class="chip-top" style="background:{{item.color}};" hero-id="{{item.title}}-{{item.description}}-art" hero?="{{selecteddescription === item}}"></div>
              <div class="chip-bottom">
                <div class="chip-description-title">{{item.description}}</div>
                <div class="chip-title">{{item.title}}</div>
              </div>
            </div>

          </template>

        </div>
      </section>

      <section id="details">

        <div class="card" layout horizontal hero-id="{{selecteddescription.title}}-{{selecteddescription.description}}" hero on-tap="{{transition}}">
          <div class="card-left" style="background:{{selecteddescription.color}};" hero-id="{{selecteddescription.title}}-{{selecteddescription.description}}-art" hero></div>
          <div class="card-right" flex>
            <div layout horizontal center>
              <div>
                <div class="card-icon" style="background:{{selecteddescription.color}};"></div>
              </div>
              <div flex>
                <div class="card-description-title">{{selecteddescription.description}}</div>
                <div class="card-description-title">{{selecteddescription.title}}</div>
              </div>
            </div>
          </div>
        </div>

      </section>

    </core-animated-pages>

  </template>
  <script>

    Polymer('project-grid', {

      page: 0,

      items: [
        { title: '365 Days of Me', description: 'Once a day journal app', color: '#AC013D' },
        { title: 'open meh', description: 'Open Source Meh app', color: '#972ff8' },
        { title: 'PhysicsLayout', description: 'So cool physics', color: '#7dd6fe' },
        { title: 'GeoTune', description: 'Favorite tunes upon entering', color: '#dc3c84' }
      ],

      selecteddescription: null,

      transition: function(e) {
        if (this.page === 0 && e.target.templateInstance.model.item) {
          this.selecteddescription = e.target.templateInstance.model.item;
          this.page = 1;
        } else {
          this.page = 0;
        }
      }
    });

  </script>
  </polymer-element>
