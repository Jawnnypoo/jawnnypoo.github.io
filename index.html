<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="generator" content="Jawnnypoo" />
  <title>Jawnnypoo</title>
  <!-- Place favicon.ico and apple-touch-icon.png in the root directory -->

  <!-- Chrome for Android theme color -->
  <meta name="theme-color" content="#00BCD4">

  <!-- Web Application Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Tile color for Win8 -->
  <meta name="msapplication-TileColor" content="#00BCD4">

  <!-- Add to homescreen for Chrome on Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Jawnnypoo">
  <link rel="icon" sizes="192x192" href="images/touch/chrome-touch-icon-192x192.png">

  <!-- Add to homescreen for Safari on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Jawnnypoo">
  <link rel="apple-touch-icon" href="images/touch/apple-touch-icon.png">

  <!-- Tile icon for Win8 (144x144) -->
  <meta name="msapplication-TileImage" content="images/touch/ms-touch-icon-144x144-precomposed.png">

  <!-- build:css styles/main.css -->
  <link rel="stylesheet" href="styles/main.css">
  <!-- endbuild-->

  <!-- build:js bower_components/webcomponentsjs/webcomponents-lite.min.js -->
  <script src="bower_components/webcomponentsjs/webcomponents-lite.js"></script>
  <!-- endbuild -->

  <!-- will be replaced with elements/elements.vulcanized.html -->
  <link rel="import" href="elements/elements.html">
  <!-- endreplace-->
</head>

<body unresolved class="fullbleed layout vertical">
  <span id="browser-sync-binding"></span>
  <template is="dom-bind" id="app">

    <paper-drawer-panel id="paperDrawerPanel">
      <div drawer>

        <!-- Drawer Toolbar -->
        <paper-toolbar id="drawerToolbar">
          <span class="paper-font-title">Menu</span>
        </paper-toolbar>

        <!-- Drawer Content -->
          <paper-menu class="list" attr-for-selected="data-route" selected="{{route}}" on-iron-select="onMenuSelect">
              <a data-route="home" href="/">
                <iron-icon icon="home"></iron-icon>
                <span>Home</span>
              </a>

              <a data-route="resume" href="/resume">
                <iron-icon icon="book"></iron-icon>
                <span>Resume</span>
              </a>
          </paper-menu>
      </div>
      <paper-header-panel main mode="waterfall-tall">

        <!-- Main Toolbar -->
        <paper-toolbar id="mainToolbar">
          <paper-icon-button id="paperToggle" icon="menu" paper-drawer-toggle></paper-icon-button>
          <span class="flex"></span>

          <!-- Toolbar icons -->
          <paper-icon-button icon="shop" onclick="openPage('https://play.google.com/store/apps/dev?id=8992288925330781810')"></paper-icon-button>
          <paper-icon-button src="images/ic_github_light.png" onclick="openPage('https://github.com/Jawnnypoo')"></paper-icon-button>
          <a href="mailto:jawnnypoo@gmail.com" class="link-button"><paper-icon-button icon="mail"></paper-icon-button></a>

          <!-- Application name -->
          <div class="middle paper-font-display2 app-name">John Carlson</div>

          <!-- Application sub title -->
          <div class="bottom title"></div>

        </paper-toolbar>

        <!-- Main Content -->
        <div class="content">
          <iron-pages attr-for-selected="data-route" selected="{{route}}">

            <section data-route="home">

              <h1 class="text-section">Android</h1>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button src="images/ic_github.png" onclick="openPage('https://github.com/Jawnnypoo/open-meh')"></paper-icon-button>
                  <paper-icon-button icon="shop" onclick="openPage('https://play.google.com/store/apps/details?id=com.jawnnypoo.openmeh')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="http://lh3.googleusercontent.com/9ShGYeHxnSH4kswZ-yDQuW8j-D7I7ilku4mFZG-XRA-TfX0OsrvCYB4T-lRIKK3S9-A=w200-rw"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">open meh</span>
                      </br>
                      <span class="text-points">Retrofit • Gson • Dynamic theming</span>
                      </br>
                      <span>An open source unofficial meh.com app. Uses Retrofit for its REST client, Gson for Json parsing, and adapts the app colors based on the API response</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button src="images/ic_github.png" onclick="openPage('https://github.com/Jawnnypoo/PhysicsLayout')"></paper-icon-button>
                  <paper-icon-button icon="shop" onclick="openPage('https://play.google.com/store/apps/details?id=com.jawnnypoo.physicslayout.sample')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="http://lh3.googleusercontent.com/9Bx1Lxy_CoXo-V4mMybw86NUuuzbIa2SkNa9gfj2nOd4y7rz06sOjePy-I7ANRivwCM=w200-rw"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">PhysicsLayout</span>
                      </br>
                      <span class="text-points">Box2d • Custom Layout • Drag detection</span>
                      </br>
                      <span>Android layout that simulates physics using JBox2D. Simply add views to the layout, and watch them interact.</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button icon="shop" onclick="openPage('https://play.google.com/store/apps/details?id=com.jawnnypoo.j365')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="http://lh4.ggpht.com/t4aaDVdlY7KTCUxQSSR254JRxV3q5XZlFCxuBsf2NZQgIaFl94Rx7pfLwfZ-iESfKJVZ=w200-rw"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">365 Days of Me</span>
                      </br>
                      <span class="text-points">SQLite • Scheduled Notifications • Google Drive backup</span>
                      </br>
                      <span>365 Days of Me makes daily journaling doable. Simple prompts, from thought-provoking to humorous, ask for a simple response keeping you from creating excuses.</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button icon="shop" onclick="openPage('https://play.google.com/store/apps/details?id=com.jawnnypoo.geotune')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="http://lh3.ggpht.com/74TmXm5Zh77wffAmE-k5I75OI5RDva5uZYvbzne3_MbJo1T7gh4EJj7wGEnQimV0TZKZ=w200-rw"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">GeoTune</span>
                      </br>
                      <span class="text-points">Geofences • Google Maps • Content Provider</span>
                      </br>
                      <span>GeoTune gives you what you didn't know you needed. A location based theme song.</span>
                  </div>
                </div>
              </paper-material>

              <paper-button raised class="colored" onclick="openPage('https://play.google.com/store/apps/dev?id=8992288925330781810')">SEE ALL APPS</paper-button>

              <h1 class="text-section">Web</h1>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button src="images/ic_github.png" onclick="openPage('https://github.com/Jawnnypoo/android-icon-grabber')"></paper-icon-button>
                  <paper-icon-button icon="social:public" onclick="openPage('http://jawnnypoo.github.io/android-icon-grabber/')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_icongrabber.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">Android Icon Grabber</span>
                      </br>
                      <span class="text-points">Polymer • Import.io • Ajax</span>
                      </br>
                      <span>A site I created for designers who want to easily download full resolution icons from the Play Store as a starting point for icon packs.</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button src="images/ic_github.png" onclick="openPage('https://github.com/Jawnnypoo/jawnnypoo.github.io')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_jawnnypoo.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">Jawnnypoo.com</span>
                      </br>
                      <span class="text-points">Polymer • Routing • WebComponents</span>
                      </br>
                      <span>This site is open source!</span>
                  </div>
                </div>
              </paper-material>

              <h1 class="text-section">Games</h1>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button src="images/ic_github.png" onclick="openPage('https://github.com/Jawnnypoo/zed')"></paper-icon-button>
                  <a href="apks/zed-debug.apk" class="link-button"><paper-icon-button icon="file-download"></paper-icon-button></a>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_zed.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">ZED</span>
                      </br>
                      <span class="text-points">OpenGL • Collision Detection • Lifecycle Management</span>
                      </br>
                      <span>The app I created for my Directed Study for my Certificate in Game Programming. A game created with OpenGL in Android with commented code, derived from Replica Island</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button icon="av:videocam" onclick="openPage('https://www.youtube.com/watch?v=9EaLoHYM9to')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_metalblocksolid.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">Metal Block Solid</span>
                      </br>
                      <span class="text-points">DirectX • Xbox Controller Input • Stealth AI</span>
                      </br>
                      <span>Final project for Game Programming 2, created with the SAGE engine from Dr. Ian Parberry, with custom AI and collision detection.</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button icon="av:videocam" onclick="openPage('https://www.youtube.com/watch?v=zSCGcyp-eKE')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_skyknights.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">Sky Knights Arena</span>
                      </br>
                      <span class="text-points">DirectX • Xbox Controller Input • Skill Tree</span>
                      </br>
                      <span>Final project for Game Programming 1, featuring skill trees, multiple weapons, a companion, and boss battles.</span>
                  </div>
                </div>
              </paper-material>

              <paper-material elevation="3">
                <div class="align-right">
                  <paper-icon-button icon="av:videocam" onclick="openPage('https://www.youtube.com/watch?v=Qhs6EXBly4c')"></paper-icon-button>
                </div>
                <div class="post-container">
                  <div class="post-thumb">
                    <img src="images/ic_portal.png"/>
                  </div>
                  <div class="post-content">
                      <span class="text-title">Portal Rube Goldberg</span>
                      </br>
                      <span class="text-points">Particle Effects • Box2d • Portals</span>
                      </br>
                      <span>Final project for Game Math and Physics; a Rube Goldberg machine with a Portal themed twist.</span>
                  </div>
                </div>
              </paper-material>

            </section>

            <section data-route="resume">
              <paper-material elevation="3">
                <img class="fit-width"src="images/resume.png"/>
              </paper-material>
              <paper-button raised class="colored" onclick="openPage('../pdfs/carlson-resume-7-12-15.pdf')">DOWNLOAD PDF</paper-button>
            </section>

            <section data-route="contact">
              <paper-material elevation="1">
                <h2 class="paper-font-display2">Contact</h2>
                <paper-icon-button src="images/ic_github.png" style="color: red;"></paper-icon-button>
                <p>This is the contact section</p>
              </paper-material>
            </section>

          </iron-pages>
        </div>
      </paper-header-panel>
    </paper-drawer-panel>

  </template>

  <!-- build:js scripts/app.js -->
  <script src="scripts/app.js"></script>
  <!-- endbuild-->
</body>

</html>
